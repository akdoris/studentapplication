<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f7f7f7; }
        h1 { color: #333; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        input, button { padding: 8px; margin: 5px; }
        button { cursor: pointer; }
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 5px #ccc; }
    </style>
</head>
<body>
    <h1>Student Management</h1>
    <div class="form-container">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="course" placeholder="Course">
        <button onclick="addStudent()">Add Student</button>
    </div>
    <table>
        <thead>
            <tr><th>ID</th><th>Name</th><th>Course</th><th>Actions</th></tr>
        </thead>
        <tbody id="studentsTable"></tbody>
    </table>

    <script>
        const api = "http://localhost:8080/api/students";

        async function fetchStudents() {
            const res = await fetch(api);
            const data = await res.json();
            const table = document.getElementById("studentsTable");
            table.innerHTML = "";
            data.forEach(s => {
                table.innerHTML += `
                    <tr>
                        <td>${s.id}</td>
                        <td contenteditable="true" onblur="updateStudent(${s.id}, this.parentElement.children[1].innerText, this.parentElement.children[2].innerText)">${s.name}</td>
                        <td contenteditable="true" onblur="updateStudent(${s.id}, this.parentElement.children[1].innerText, this.parentElement.children[2].innerText)">${s.course}</td>
                        <td><button onclick="deleteStudent(${s.id})">Delete</button></td>
                    </tr>
                `;
            });
        }

        async function addStudent() {
            const name = document.getElementById("name").value;
            const course = document.getElementById("course").value;
            await fetch(api, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, course })
            });
            document.getElementById("name").value = "";
            document.getElementById("course").value = "";
            fetchStudents();
        }

        async function updateStudent(id, name, course) {
            await fetch(`${api}/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, course })
            });
            fetchStudents();
        }

        async function deleteStudent(id) {
            await fetch(`${api}/${id}`, { method: "DELETE" });
            fetchStudents();
        }

        fetchStudents();
    </script>
</body>
</html>
